name: repro-buildcache-os-keyerror

# Reproduces the bug fixed by os-buildcache-fix (Spack issue #52062):
# source-building a spec with os=sonoma on a sequoia host crashes with
# `KeyError: 'sonoma'` in Darwin.setup_platform_environment because only
# the host's OS is registered in operating_sys. The patch pre-registers
# recent macOS versions so the lookup succeeds.
#
# Producer (macos-14): builds bzip2 + deps as os=sonoma, pushes only the
# deps to a mirror so the consumer must source-build bzip2.
# Consumer (macos-15, patched): installs bzip2 os=sonoma with deps from
# cache and package source-built. Asserts the install succeeds.

on:
  workflow_dispatch:
    inputs:
      spack_repo:
        description: "Spack repo (owner/name) for both producer and consumer"
        required: true
        default: "spack/spack"
      spack_ref:
        description: "Spack branch or tag — use v1.1.1 to demo the bug"
        required: true
        default: "v1.1.1"

env:
  SPACK_REPO: ${{ inputs.spack_repo }}
  SPACK_REF: ${{ inputs.spack_ref }}

jobs:
  buildcache_macos_14:
    runs-on: macos-14
    steps:
      - name: Checkout Spack (${{ inputs.spack_ref }} from ${{ inputs.spack_repo }})
        run: |
          git clone --depth 1 --branch "$SPACK_REF" "https://github.com/${SPACK_REPO}.git"
          echo "SPACK_ROOT=$PWD/spack" >> $GITHUB_ENV

      - name: Setup Spack and show OS detection
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"
          echo "Env hints:"
          echo "  MACOSX_DEPLOYMENT_TARGET=${MACOSX_DEPLOYMENT_TARGET-<unset>}"
          echo "  SYSTEM_VERSION_COMPAT=${SYSTEM_VERSION_COMPAT-<unset>}"
          echo "sw_vers (default):"
          sw_vers || true
          echo "sw_vers (SYSTEM_VERSION_COMPAT=0):"
          SYSTEM_VERSION_COMPAT=0 sw_vers || true
          spack arch -f
          spack debug report

      - name: Build bzip2 from source (deps inherit os=sonoma)
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"
          spack spec -I bzip2
          spack install bzip2
          spack find -v

      - name: Push only the deps of bzip2 to a local buildcache mirror
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"
          mkdir -p mirror
          spack mirror add --type binary --unsigned local-buildcache "file://$(pwd)/mirror"
          # --only=dependencies pushes bzip2's dep tree but not bzip2 itself.
          # This forces the consumer to source-build bzip2.
          spack buildcache push --unsigned --update-index --only=dependencies -f local-buildcache bzip2
          echo "Mirror contents:"
          find mirror -maxdepth 4 -type f | sed 's|^|  |'

      - name: Upload mirror as artifact
        uses: actions/upload-artifact@v4
        with:
          name: spack-mirror-macos-14
          path: mirror

  consume_buildcache_macos_15:
    runs-on: macos-15
    needs: buildcache_macos_14
    env:
      # Avoid "compatibility mode" / deployment-target overrides influencing
      # Spack OS detection on the consumer side.
      MACOSX_DEPLOYMENT_TARGET: ""
      SYSTEM_VERSION_COMPAT: "0"
    steps:
      - name: Checkout Spack (${{ inputs.spack_ref }} from ${{ inputs.spack_repo }})
        run: |
          git clone --depth 1 --branch "$SPACK_REF" "https://github.com/${SPACK_REPO}.git"
          echo "SPACK_ROOT=$PWD/spack" >> $GITHUB_ENV

      - name: Download mirror artifact
        uses: actions/download-artifact@v4
        with:
          name: spack-mirror-macos-14
          path: mirror

      - name: Setup Spack and show OS detection
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"
          echo "Env hints:"
          echo "  MACOSX_DEPLOYMENT_TARGET=${MACOSX_DEPLOYMENT_TARGET-<unset>}"
          echo "  SYSTEM_VERSION_COMPAT=${SYSTEM_VERSION_COMPAT-<unset>}"
          echo "sw_vers (default):"
          sw_vers || true
          echo "sw_vers (SYSTEM_VERSION_COMPAT=0):"
          SYSTEM_VERSION_COMPAT=0 sw_vers || true
          spack arch
          spack debug report
          echo "Mirror index files:"
          find mirror -maxdepth 4 -type f -name "index.json*" | sed 's|^|  |' || true

      - name: Add mirror and force source-build of bzip2 with os=sonoma
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"

          spack mirror add --type binary --unsigned local-buildcache "file://$(pwd)/mirror"

          echo "Buildcache contents (deps built on macOS 14 = os=sonoma):"
          spack buildcache list -a -l

          echo "Concretizing bzip2 os=sonoma..."
          spack spec -I bzip2 os=sonoma

          # On unpatched Spack the line below dies with:
          #   ==> Error: KeyError: 'sonoma'
          # (from lib/spack/spack/platforms/darwin.py:setup_platform_environment)
          # On the patched branch sonoma is pre-registered so source build proceeds.
          echo "Installing bzip2 (deps from cache, package source-built)..."
          spack install \
            --use-buildcache package:never,dependencies:auto \
            --no-check-signature \
            bzip2 os=sonoma

          echo "Installed packages:"
          spack find -v
          echo "bzip2 os assignment:"
          spack find -v bzip2 | grep -i "os=" || true

      - name: Extra debug — show concretization details if anything went wrong
        if: failure()
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"
          spack -d spec -I bzip2 os=sonoma || true
          spack buildcache list -a -l || true
