name: repro-buildcache-os-keyerror

# Reproduces the bug fixed by os-buildcache-fix (Spack issue #52062):
# source-building a spec with os=sonoma on a sequoia host crashes with
# `KeyError: 'sonoma'` in Darwin.setup_platform_environment. The patch
# pre-registers recent macOS versions so the lookup succeeds.
#
# Producer (macos-14): builds bzip2 and pushes everything to a mirror
# (bzip2 + deps, all os=sonoma).
# Consumer (macos-15): installs `bzip2 ^diffutils@3.11`. diffutils is
# a direct build dep of bzip2 and the cache has 3.12, so 3.11 forces a
# source build of diffutils while its surrounding deps (libiconv, gmake)
# stay os=sonoma in cache. The solver is likely to keep the source-
# built diffutils os=sonoma + %apple-clang@15.0.0 (from the cached
# external) for DAG cohesion — which triggers the KeyError on unpatched
# Spack and succeeds on the patched branch. Flipping a variant on bzip2
# itself would have pinned bzip2 to os=sequoia (host) via the apple-
# clang constraint and not reproduced the bug; libiconv isn't
# `^`-referenceable from bzip2 (transitive build dep, not link/run).

on:
  workflow_dispatch:
    inputs:
      spack_repo:
        description: "Spack repo (owner/name) for both producer and consumer"
        required: true
        default: "spack/spack"
      spack_ref:
        description: "Spack branch or tag — use v1.1.1 to demo the bug"
        required: true
        default: "v1.1.1"

env:
  SPACK_REPO: ${{ inputs.spack_repo }}
  SPACK_REF: ${{ inputs.spack_ref }}

jobs:
  buildcache_macos_14:
    runs-on: macos-14
    steps:
      - name: Checkout Spack (${{ inputs.spack_ref }} from ${{ inputs.spack_repo }})
        run: |
          git clone --depth 1 --branch "$SPACK_REF" "https://github.com/${SPACK_REPO}.git"
          echo "SPACK_ROOT=$PWD/spack" >> $GITHUB_ENV

      - name: Setup Spack and show OS detection
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"
          echo "Env hints:"
          echo "  MACOSX_DEPLOYMENT_TARGET=${MACOSX_DEPLOYMENT_TARGET-<unset>}"
          echo "  SYSTEM_VERSION_COMPAT=${SYSTEM_VERSION_COMPAT-<unset>}"
          echo "sw_vers (default):"
          sw_vers || true
          echo "sw_vers (SYSTEM_VERSION_COMPAT=0):"
          SYSTEM_VERSION_COMPAT=0 sw_vers || true
          spack arch -f
          spack debug report

      - name: Build bzip2 from source (all nodes os=sonoma)
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"
          spack spec -I bzip2
          spack install bzip2
          spack find -v

      - name: Push bzip2 and its full dep tree to the buildcache mirror
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"
          mkdir -p mirror
          spack mirror add --type binary --unsigned local-buildcache "file://$(pwd)/mirror"
          spack buildcache push --unsigned --update-index -f local-buildcache bzip2
          echo "Mirror contents:"
          find mirror -maxdepth 4 -type f | sed 's|^|  |'

      - name: Upload mirror as artifact
        uses: actions/upload-artifact@v4
        with:
          name: spack-mirror-macos-14
          path: mirror

  consume_buildcache_macos_15:
    runs-on: macos-15
    needs: buildcache_macos_14
    env:
      # Avoid "compatibility mode" / deployment-target overrides influencing
      # Spack OS detection on the consumer side.
      MACOSX_DEPLOYMENT_TARGET: ""
      SYSTEM_VERSION_COMPAT: "0"
    steps:
      - name: Checkout Spack (${{ inputs.spack_ref }} from ${{ inputs.spack_repo }})
        run: |
          git clone --depth 1 --branch "$SPACK_REF" "https://github.com/${SPACK_REPO}.git"
          echo "SPACK_ROOT=$PWD/spack" >> $GITHUB_ENV

      - name: Download mirror artifact
        uses: actions/download-artifact@v4
        with:
          name: spack-mirror-macos-14
          path: mirror

      - name: Setup Spack and show OS detection
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"
          echo "Env hints:"
          echo "  MACOSX_DEPLOYMENT_TARGET=${MACOSX_DEPLOYMENT_TARGET-<unset>}"
          echo "  SYSTEM_VERSION_COMPAT=${SYSTEM_VERSION_COMPAT-<unset>}"
          echo "sw_vers (default):"
          sw_vers || true
          echo "sw_vers (SYSTEM_VERSION_COMPAT=0):"
          SYSTEM_VERSION_COMPAT=0 sw_vers || true
          spack arch
          spack debug report
          echo "Mirror index files:"
          find mirror -maxdepth 4 -type f -name "index.json*" | sed 's|^|  |' || true

      - name: Add mirror and install bzip2 ^diffutils@3.11 (dep version flip)
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"

          spack mirror add --type binary --unsigned local-buildcache "file://$(pwd)/mirror"

          echo "Buildcache contents (built on macOS 14 = os=sonoma):"
          spack buildcache list -a -l

          # Asking for an older diffutils than the cached 3.12 forces a source
          # build of diffutils (a direct build dep of bzip2). The surrounding
          # cached deps (libiconv, gmake, gnuconfig) are os=sonoma + apple-
          # clang@15.0.0, so the solver should keep the source-built diffutils
          # os=sonoma for DAG cohesion → triggers the KeyError on unpatched
          # Spack and succeeds on the patched branch.
          echo "Concretizing bzip2 ^diffutils@3.11..."
          spack spec -I bzip2 ^diffutils@3.11

          echo "Installing bzip2 ^diffutils@3.11..."
          spack install --no-check-signature bzip2 ^diffutils@3.11

          echo "Installed packages:"
          spack find -v
          echo "diffutils os assignment:"
          spack find -v diffutils | grep -i "os=" || true

      - name: Extra debug — show concretization details if anything went wrong
        if: failure()
        run: |
          . "$SPACK_ROOT/share/spack/setup-env.sh"
          spack -d spec -I bzip2 ^diffutils@3.11 || true
          spack buildcache list -a -l || true
